dataset:
  metadata_dir: "artifacts"

nms:
  max_num_faces: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

train:
  random_state: 42
  test_size: 0.2
  model_type: "random_forest"
  class_names: []
  random_forest:
    n_estimators: [200, 400]
    max_depth: [null, 12, 20, 30]
    min_samples_split: [2, 5]
    min_samples_leaf: [1, 2]
    max_features: ["sqrt", "log2"]
    class_weight: ["balanced"]
    cv: 3

artifacts:
  model_path: "models/nms_model.joblib"
  encoder_path: "models/nms_label_encoder.joblib"
  report_prefix: "nms"
